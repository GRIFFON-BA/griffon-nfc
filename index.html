<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffon - Professional Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --griffon-blue: #0054a6;
            --griffon-red: #e30613; /* De officiële PMS-match voor web */
            --bg-grey: #f2f2f2;
            --text-dark: #333333;
            --white: #ffffff;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-grey);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header nu in Griffon Rood */
        header {
            width: 100%;
            background-color: var(--griffon-red);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            height: 50px;
            width: auto;
            /* Filter om een donker logo wit te maken op de rode achtergrond */
            filter: brightness(0) invert(1); 
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin-top: 25px;
            padding-bottom: 50px;
        }

        .intro-text {
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: #555;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* De blauwe balkjes stijl voor de knoppen */
        .link-card {
            background: var(--white);
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--griffon-blue);
            padding: 18px 20px;
            margin-bottom: 12px;
            border-radius: 4px;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border-left: 6px solid var(--griffon-blue); /* De blauwe balkjes */
            transition: all 0.2s ease;
        }

        .link-card:active {
            transform: scale(0.98);
            background-color: #f9f9f9;
        }

        /* Contact knop blijft speciaal */
        .contact-card {
            background-color: var(--white);
            border-left-color: var(--griffon-red);
            color: var(--griffon-red);
            margin-top: 20px;
        }

        /* Formulier sectie */
        #contact-form-container {
            background: var(--white);
            padding: 25px;
            border-radius: 4px;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        h2 {
            color: var(--griffon-blue);
            font-size: 1.3rem;
            margin-top: 0;
            border-bottom: 2px solid var(--bg-grey);
            padding-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-size: 16px;
            background-color: #fcfcfc;
            box-sizing: border-box;
        }

        .submit-btn {
            background-color: var(--griffon-red);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <img src="logo-griffon.svg" alt="Griffon Logo" class="logo" onerror="this.src='https://www.griffon.eu/etc.clientlibs/bolton-adhesives/clientlibs/clientlib-site/resources/images/griffon-logo.svg'">
</header>

<div class="container">
    <div id="intro" class="intro-text">Professional Solutions</div>

    <div id="links-menu">
        <a href="https://www.griffon.eu" class="link-card" id="btn-home">Website Homepage</a>
        <a href="https://www.griffon.eu/en-en/leaflets-catalogs" class="link-card" id="btn-folder">Leaflets & Catalogs</a>
        <a href="https://www.instagram.com/griffon_international/" class="link-card">Instagram</a>
        <a href="https://www.facebook.com/GriffonInternational/" class="link-card">Facebook</a>
        <a href="https://www.tiktok.com/@griffon_international" class="link-card">TikTok</a>
        <a href="https://www.boltonadhesives.com" class="link-card" id="btn-parent">Bolton Adhesives</a>
        
        <a href="#" class="link-card contact-card" id="btn-contact" onclick="showForm()">Contact Me</a>
    </div>

    <div id="contact-form-container">
        <h2 id="form-header">Contactverzoek</h2>
        <form action="https://formsubmit.co/info@boltonadhesives.com" method="POST">
            <input type="text" name="name" id="field-name" placeholder="Naam" autocomplete="name" required>
            <input type="email" name="email" id="field-email" placeholder="E-mail" autocomplete="email" required>
            <input type="tel" name="phone" id="field-phone" placeholder="Telefoon" autocomplete="tel" required>
            
            <select name="request_type" required>
                <option value="" disabled selected id="opt-select">Wat wilt u ontvangen?</option>
                <option value="Information" id="opt-info">Informatie</option>
                <option value="Call-back" id="opt-call">Contactverzoek</option>
            </select>
            
            <textarea name="message" rows="3" placeholder="Bericht..."></textarea>
            
            <button type="submit" class="submit-btn" id="btn-submit">Verzenden</button>
        </form>
    </div>

    <footer>
        © <script>document.write(new Date().getFullYear())</script> Bolton Adhesives
    </footer>
</div>

<script>
    // Meertaligheid
    const translations = {
        nl: {
            intro: "Professionele Oplossingen",
            home: "Website Homepage",
            folder: "Folders & Catalogi",
            parent: "Bolton Adhesives",
            contact: "Neem contact met mij op",
            formH: "Contactverzoek",
            optSelect: "Maak een keuze...",
            optInfo: "Informatie ontvangen",
            optCall: "Verzoek om contact",
            btnSend: "Verstuur aanvraag",
            pName: "Naam", pEmail: "E-mailadres", pPhone: "Telefoonnummer"
        },
        en: {
            intro: "Professional Solutions",
            home: "Website Homepage",
            folder: "Leaflets & Catalogs",
            parent: "Bolton Adhesives",
            contact: "Contact me",
            formH: "Contact Request",
            optSelect: "Please select...",
            optInfo: "Receive information",
            optCall: "Request a call-back",
            btnSend: "Send request",
            pName: "Name", pEmail: "Email", pPhone: "Phone number"
        }
    };

    const userLang = navigator.language.substring(0, 2);
    const content = translations[userLang] || translations.en;

    document.getElementById('intro').innerText = content.intro;
    document.getElementById('btn-home').innerText = content.home;
    document.getElementById('btn-folder').innerText = content.folder;
    document.getElementById('btn-parent').innerText = content.parent;
    document.getElementById('btn-contact').innerText = content.contact;
    document.getElementById('form-header').innerText = content.formH;
    document.getElementById('opt-select').innerText = content.optSelect;
    document.getElementById('opt-info').innerText = content.optInfo;
    document.getElementById('opt-call').innerText = content.optCall;
    document.getElementById('btn-submit').innerText = content.btnSend;
    document.getElementById('field-name').placeholder = content.pName;
    document.getElementById('field-email').placeholder = content.pEmail;
    document.getElementById('field-phone').placeholder = content.pPhone;

    function showForm() {
        document.getElementById('links-menu').style.display = 'none';
        document.getElementById('intro').style.display = 'none';
        document.getElementById('contact-form-container').style.display = 'block';
    }
</script>

</body>
</html>
