<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffon - Professional Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --griffon-blue: #0054a6;
            --griffon-red: #e30613;
            --white: #ffffff;
            --light-grey: #f4f4f4;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-grey);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 30px;
        }

        .link-button {
            display: block;
            background-color: var(--white);
            color: var(--griffon-blue);
            text-decoration: none;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-weight: bold;
            border: 2px solid var(--griffon-blue);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .link-button:active {
            transform: scale(0.98);
            background-color: var(--griffon-blue);
            color: var(--white);
        }

        .contact-btn {
            background-color: var(--griffon-red);
            color: white;
            border: none;
            margin-top: 20px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.griffon.eu/etc.clientlibs/bolton-adhesives/clientlibs/clientlib-site/resources/images/griffon-logo.svg" alt="Griffon Logo" class="logo">
    
    <div id="links-container">
        </div>

    <footer>
        Part of Bolton Adhesives
    </footer>
</div>

<script>
    // Meertalige content mapping
    const translations = {
        nl: {
            homepage: "Website Homepage",
            folder: "Product Folders",
            parent: "Bolton Adhesives",
            contact: "Neem contact met mij op",
            subject: "Contactverzoek via NFC Tag"
        },
        en: {
            homepage: "Website Homepage",
            folder: "Product Catalogues",
            parent: "Bolton Adhesives",
            contact: "Contact me",
            subject: "Contact request via NFC Tag"
        },
        de: {
            homepage: "Website Startseite",
            folder: "Produktkataloge",
            parent: "Bolton Adhesives",
            contact: "Kontaktieren Sie mich",
            subject: "Kontaktanfrage via NFC Tag"
        }
    };

    // Bepaal taal (fallback naar Engels)
    const userLang = navigator.language.substring(0, 2);
    const content = translations[userLang] || translations.en;

    const links = [
        { label: content.homepage, url: "https://www.griffon.eu" },
        { label: content.folder, url: "https://www.griffon.eu/en-en/documentation" },
        { label: "Instagram", url: "https://www.instagram.com/griffon_international/" },
        { label: "Facebook", url: "https://www.facebook.com/GriffonInternational/" },
        { label: "TikTok", url: "https://www.tiktok.com/@griffon_international" },
        { label: content.parent, url: "https://www.boltonadhesives.com" },
        { label: content.contact, url: `mailto:info@boltonadhesives.com?subject=${content.subject}`, isContact: true }
    ];

    const container = document.getElementById('links-container');

    links.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.className = 'link-button' + (link.isContact ? ' contact-btn' : '');
        a.innerText = link.label;
        container.appendChild(a);
    });
</script>

</body>
</html>
